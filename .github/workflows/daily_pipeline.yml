name: AI Radar Daily Pipeline

on:
  schedule:
    - cron: '0 7 * * *'    # 7:00 AM UTC every day
  workflow_dispatch:         # allows manual trigger from GitHub UI anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # kill if it hangs — your pipeline takes ~10min

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'       # caches dependencies between runs — speeds up install

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline/flow.py
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          JINA_API_KEY:          ${{ secrets.JINA_API_KEY }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          ALERT_EMAIL_FROM:      ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD:  ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO:        ${{ secrets.ALERT_EMAIL_TO }}
